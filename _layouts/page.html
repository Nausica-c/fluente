---
layout: default
---
<article class="article-container">
    <h1 style="font-size: 2.5rem; line-height: 1.2; margin-bottom: 20px;">{{ page.title }}</h1>
    
    {% if page.lead %}
    <p style="font-size: 1.2rem; color: var(--text-gray); font-weight: 600; margin-bottom: 30px;">
        {{ page.lead }}
    </p>
    {% endif %}

    {{ content }}
</article>
