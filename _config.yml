# ----------------------------------------------------------------
# 1. INFORMAZIONI GENERALI DEL SITO
# ----------------------------------------------------------------
title: Fluente
email: fluentedesk@gmail.com
description: >- # Descrizione SEO per Google
  Il tuo hub strategico per padroneggiare le lingue nel 2026. 
  Scopri il metodo dei 15 minuti, recensioni oneste e guide pratiche 
  per inglese, francese, spagnolo, tedesco e portoghese.

# Configurazione URL (Sostituisci tuo-username con il tuo vero nome GitHub)
url: "https://Nausica-c.github.io"
baseurl: "" # Lascia vuoto se il sito è nella root del dominio

# ----------------------------------------------------------------
# 2. PANNELLO DI CONTROLLO MARKETING (AWIN / BABBEL)
# ----------------------------------------------------------------
# Modificando questi link qui, si aggiorneranno in ogni pagina del sito.
babbel_affiliate_link: "https://www.awin1.com/cread.php?s=2622032&v=9659&q=387499&r=2764918"

# URL delle immagini dei banner (opzionale se gestiti tramite includes)
banner_top_url: "https://www.awin1.com/cshow.php?s=2622032&v=9659&q=387499&r=2764918"
banner_side_url: "https://www.awin1.com/cshow.php?s=2622023&v=9659&q=387499&r=2764918"

# ----------------------------------------------------------------
# 3. SOCIAL & CONTATTI
# ----------------------------------------------------------------
pinterest_url: "https://it.pinterest.com/Nausicac"
twitter_username: fluente_lingue
github_username: Nausica-c

# ----------------------------------------------------------------
# 4. CONFIGURAZIONE SEO & PERMALINK
# ----------------------------------------------------------------
# Struttura URL pulita: fluente.it/categoria/titolo-articolo/
permalink: /:categories/:title/
markdown: kramdown
excerpt_separator: # Usa questo tag nei post per decidere l'anteprima

# ----------------------------------------------------------------
# 5. AUTOMAZIONE LAYOUT (Defaults)
# ----------------------------------------------------------------
# Diciamo a Jekyll di applicare i layout corretti senza doverlo scrivere ogni volta
defaults:
  - scope:
      path: "" # Per tutti i file della root
    values:
      layout: "default"
  - scope:
      path: "_posts" # Per tutti gli articoli del blog
    values:
      layout: "post"
      author: "Team Fluente"

# ----------------------------------------------------------------
# 6. PLUGIN ATTIVI (GitHub Pages nativi)
# ----------------------------------------------------------------
plugins:
  - jekyll-seo-tag     # Genera meta-tag, titoli e OpenGraph automaticamente
  - jekyll-sitemap     # Genera il file sitemap.xml per Google
  - jekyll-feed        # Genera il feed RSS per i lettori
  - jekyll-paginate    # Per la gestione delle pagine del blog

paginate: 10
paginate_path: "/blog/page:num/"

# ----------------------------------------------------------------
# 7. ESCLUSIONI (File da non pubblicare online)
# ----------------------------------------------------------------
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .jekyll-cache
  - .jekyll-metadata
  - README.md
