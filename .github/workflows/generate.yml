name: Generate FluenteMente Articles

on:
  workflow_dispatch:   # bottone manuale "Run"
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Run pipeline
        run: |
          python engine/run_pipeline.py

      - name: Commit generated articles
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add _posts
          git commit -m "auto: generate articles" || echo "no changes"
          git push
