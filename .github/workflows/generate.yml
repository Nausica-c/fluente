name: FluenteMente Growth Engine 2.0

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 1. scarica repo
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # 🐍 2. installa Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 📦 3. dipendenze
      - name: Install dependencies
        run: |
          pip install pyyaml

      # 🚀 4. esegui pipeline V2
      - name: Run Growth Engine
        run: |
          python engine/run_pipeline_v2.py

      # 💾 5. commit automatico
      - name: Commit generated articles
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add _posts

          git commit -m "auto: generate articles (Growth Engine 2.0)" || echo "no changes"

          git push
